<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Production Tracker</title>
<style>
  :root{
    --bg:#070b14;
    --bg2:#0c1322;
    --panel:#0e1626;
    --panel2:#101a2c;
    --border:#1d2940;
    --text:#e6ecf5;
    --muted:#8a95ab;
    --accent:#22d3ee;
    --accent2:#34d399;
    --orange:#fb923c;
    --purple:#a78bfa;
    --red:#f87171;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:radial-gradient(circle at top, #0c1322 0%, #06090f 70%);
    color:var(--text);
    min-height:100vh;
  }
  .hidden{display:none !important;}

  /* ---------- LOGIN ---------- */
  #loginScreen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .brand{
    font-size:2rem;
    font-weight:800;
    margin-bottom:4px;
  }
  .brand span{color:var(--accent);}
  .brand-sub{color:var(--muted);margin-bottom:28px;font-size:0.95rem;}
  .login-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px 22px;
    width:100%;
    max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .role-toggle{
    display:flex;
    background:var(--bg2);
    border-radius:12px;
    padding:4px;
    margin-bottom:20px;
    border:1px solid var(--border);
  }
  .role-toggle button{
    flex:1;
    padding:10px;
    border:none;
    background:transparent;
    color:var(--muted);
    border-radius:9px;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
  }
  .role-toggle button.active{
    background:var(--accent);
    color:#04222a;
  }
  .field{
    text-align:left;
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:0.78rem;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg2);
    color:var(--text);
    font-size:1rem;
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--accent);
  }
  .btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#0ea5c4);
    color:#04222a;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    margin-top:6px;
  }
  .btn.green{background:linear-gradient(135deg,var(--accent2),#0fa86c);color:#04220f;}
  .btn.outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .error-msg{color:var(--red);font-size:0.85rem;margin-top:10px;min-height:18px;}

  /* ---------- APP SHELL ---------- */
  #appScreen{display:flex;min-height:100vh;}
  header{
    position:fixed;top:0;left:0;right:0;height:60px;
    background:rgba(10,16,28,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    z-index:50;
  }
  header .left{display:flex;align-items:center;gap:10px;}
  #menuBtn{
    background:none;border:none;color:var(--text);font-size:1.4rem;cursor:pointer;padding:4px 8px;
  }
  header .logo{font-weight:800;font-size:1.1rem;}
  header .logo span{color:var(--accent);}
  .live-dot{
    display:inline-flex;align-items:center;gap:6px;color:var(--accent2);font-size:0.8rem;margin-left:10px;
  }
  .live-dot::before{
    content:"";width:8px;height:8px;background:var(--accent2);border-radius:50%;
    box-shadow:0 0 8px var(--accent2);
  }
  .userchip{
    display:flex;align-items:center;gap:8px;
    background:var(--panel2);border:1px solid var(--border);
    padding:6px 12px;border-radius:999px;font-size:0.85rem;
  }
  .userchip .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);}
  #logoutBtn{
    background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:7px 14px;border-radius:8px;font-size:0.85rem;margin-left:10px;cursor:pointer;
  }

  #sidebar{
    position:fixed;top:60px;bottom:0;left:0;width:280px;
    background:var(--bg2);
    border-right:1px solid var(--border);
    overflow-y:auto;
    transform:translateX(-100%);
    transition:transform .25s ease;
    z-index:40;
    padding-bottom:30px;
  }
  #sidebar.open{transform:translateX(0);}
  .sb-section-title{
    font-size:0.72rem;letter-spacing:1.5px;color:var(--muted);
    padding:18px 18px 8px;text-transform:uppercase;
  }
  .line-item{
    padding:13px 18px;
    cursor:pointer;
    display:flex;align-items:center;gap:10px;
    color:var(--text);
    font-weight:600;
    border-left:3px solid transparent;
  }
  .line-item:hover{background:rgba(255,255,255,0.03);}
  .line-item.active{
    background:rgba(34,211,238,0.08);
    border-left-color:var(--accent);
    color:var(--accent);
  }
  .flavor-sub{
    background:#0a1120;
  }
  .flavor-item{
    padding:11px 18px 11px 42px;
    cursor:pointer;
    color:var(--muted);
    font-size:0.92rem;
    border-left:3px solid transparent;
  }
  .flavor-item:hover{background:rgba(255,255,255,0.03);color:var(--text);}
  .flavor-item.active{
    color:var(--purple);
    border-left-color:var(--purple);
    background:rgba(167,139,250,0.08);
  }
  .chevron{margin-left:auto;transition:transform .2s;color:var(--muted);font-size:0.8rem;}
  .line-item.open .chevron{transform:rotate(90deg);}

  #overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    z-index:35;display:none;
  }
  #overlay.show{display:block;}

  main{
    flex:1;
    margin-top:60px;
    padding:22px 18px 60px;
    width:100%;
  }

  .page-title{
    font-size:1.5rem;font-weight:800;margin-bottom:18px;
  }
  .empty-state{
    color:var(--muted);
    text-align:center;
    padding:60px 20px;
    font-size:1rem;
  }
  .empty-state .big{font-size:2.4rem;margin-bottom:10px;}

  .detail-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    max-width:560px;
  }
  @media(min-width:640px){
    .detail-grid{grid-template-columns:1fr 1fr;}
  }
  .detail-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px 18px;
    border-top:3px solid var(--accent);
  }
  .detail-card:nth-child(2n){border-top-color:var(--accent2);}
  .detail-card:nth-child(3n){border-top-color:var(--orange);}
  .detail-card:nth-child(4n){border-top-color:var(--purple);}
  .detail-card label{
    display:block;font-size:0.75rem;color:var(--muted);
    text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px;
  }
  .detail-card input{
    width:100%;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:10px 12px;
    font-size:1.05rem;
    font-weight:700;
  }
  .detail-card input:disabled{
    color:var(--text);
    opacity:0.85;
    -webkit-text-fill-color:var(--text);
  }
  .detail-card .unit{color:var(--muted);font-size:0.8rem;font-weight:500;margin-left:4px;}

  .flavor-name-row{
    display:flex;align-items:center;gap:10px;margin-bottom:18px;
    max-width:560px;
  }
  .flavor-name-row input{
    flex:1;
    font-size:1.3rem;font-weight:800;
    background:transparent;
    border:none;border-bottom:2px solid var(--border);
    color:var(--text);padding:6px 2px;
  }
  .flavor-name-row input:focus{outline:none;border-color:var(--accent);}
  .flavor-name-row input:disabled{-webkit-text-fill-color:var(--text);opacity:1;}

  .save-row{
    margin-top:22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  .save-status{font-size:0.85rem;color:var(--muted);}
  .save-status.ok{color:var(--accent2);}

  .admin-badge{
    display:inline-block;background:rgba(34,211,238,0.12);color:var(--accent);
    font-size:0.72rem;padding:4px 10px;border-radius:999px;margin-bottom:14px;font-weight:700;
  }
  .view-badge{
    display:inline-block;background:rgba(167,139,250,0.12);color:var(--purple);
    font-size:0.72rem;padding:4px 10px;border-radius:999px;margin-bottom:14px;font-weight:700;
  }

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="brand">City <span>Production</span> Tracker</div>
  <div class="brand-sub">Confectionary Division • City Group</div>
  <div class="login-card">
    <div class="role-toggle">
      <button id="userTabBtn" class="active" onclick="setRole('user')">👤 User</button>
      <button id="adminTabBtn" onclick="setRole('admin')">⚙️ Admin</button>
    </div>

    <div id="userIdField" class="field">
      <label>User ID</label>
      <select id="userIdSelect">
        <option value="">-- বাছাই করো --</option>
      </select>
    </div>
    <div id="adminIdField" class="field hidden">
      <label>Admin ID</label>
      <input type="text" id="adminIdInput" placeholder="admin">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••">
    </div>

    <button class="btn" onclick="handleLogin()">LOGIN →</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="appScreen" class="hidden">
  <header>
    <div class="left">
      <button id="menuBtn" onclick="toggleSidebar()">☰</button>
      <div class="logo">City <span>Production</span></div>
      <div class="live-dot">Live</div>
    </div>
    <div style="display:flex;align-items:center;">
      <div class="userchip"><span class="dot"></span><span id="userChipText">-</span></div>
      <button id="logoutBtn" onclick="handleLogout()">Logout</button>
    </div>
  </header>

  <div id="overlay" onclick="toggleSidebar()"></div>

  <div id="sidebar">
    <div class="sb-section-title">Production Lines</div>
    <div id="lineList"></div>
  </div>

  <main>
    <div id="welcomePage">
      <div class="empty-state">
        <div class="big">🏭</div>
        বাম পাশের মেনু থেকে একটা প্রোডাকশন লাইন সিলেক্ট করো, তারপর ফ্লেভার বাছাই করে ডিটেইলস দেখো।
      </div>
    </div>

    <div id="flavorPage" class="hidden">
      <div id="roleBadge"></div>
      <div class="flavor-name-row">
        <input type="text" id="flavorNameInput" disabled>
      </div>
      <div class="detail-grid" id="detailGrid"></div>
      <div class="save-row">
        <button class="btn green" style="width:auto;padding:12px 28px;" id="saveBtn" onclick="saveFlavor()">💾 Save Data</button>
        <span class="save-status" id="saveStatus"></span>
      </div>
    </div>
  </main>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
